spring:
  datasource:
    url: jdbc:mysql://localhost:3306/taobao-mall?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 1



  rabbitmq:
    host: 192.168.244.130
    port: 5672
    username: guest
    password: guest

    # ===== 生产者可靠性（没问题，保留）=====
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true # 将消息返回给生产者，触发ReturnCall回调

    # ===== 消费者配置 =====
    listener:
      simple:
        acknowledge-mode: manual
        missing-queues-fatal: false



mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true  #开启驼峰映射



management:
  health:
    elasticsearch:
      enabled: false

logging:
  level:
    com.github.shangtanlin: DEBUG